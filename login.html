<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login / Sign Up - ExamSpark ⚡</title>
    <link rel="stylesheet" href="style.css">
    <style>
        body { background: #f4f7f6; font-family: 'Segoe UI', sans-serif; }
        .login-container { 
            max-width: 400px; 
            margin: 5rem auto; 
            padding: 2.5rem 2rem; 
            background: white; 
            border-radius: 15px; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.1); 
            text-align: center; 
            border-top: 5px solid #4A90E2; 
        }

        /* TABS STYLING */
        .auth-tabs {
            display: flex;
            background: #f1f5f9;
            border-radius: 10px;
            margin-bottom: 25px;
            overflow: hidden;
            border: 1px solid #e2e8f0;
        }
        .tab-btn {
            flex: 1;
            padding: 12px;
            border: none;
            background: transparent;
            font-weight: bold;
            color: #64748b;
            cursor: pointer;
            transition: 0.3s;
            font-size: 1rem;
        }
        .tab-btn.active {
            background: #4A90E2;
            color: white;
        }
        
        .login-btn { 
            width: 100%; padding: 12px; border: none; border-radius: 8px; cursor: pointer; 
            font-weight: bold; font-size: 1.05rem; display: flex; align-items: center; 
            justify-content: center; gap: 10px; transition: 0.3s; 
        }
        
        .primary-btn { background: #4A90E2; color: white; }
        .primary-btn:hover { background: #357abd; }
        .success-btn { background: #2ecc71; color: white; }
        .success-btn:hover { background: #27ae60; }
        
        .google-btn { background: white; color: #555; border: 1px solid #ddd; margin-top: 10px; }
        .google-btn:hover { background: #f8f9fa; }

        .divider {
            display: flex; align-items: center; text-align: center; margin: 25px 0; color: #999; font-size: 0.9rem;
        }
        .divider::before, .divider::after { content: ''; flex: 1; border-bottom: 1px solid #ddd; }
        .divider span { padding: 0 10px; }

        .phone-input-group { display: flex; gap: 10px; margin-bottom: 20px; }
        .phone-input-group input { padding: 12px; border: 1px solid #ddd; border-radius: 8px; outline: none; font-size: 1rem; }
    </style>
</head>
<body>
    <div class="login-container">
        
        <div class="auth-tabs">
            <button class="tab-btn active" id="tab-login" onclick="switchTab('login')">Sign In</button>
            <button class="tab-btn" id="tab-signup" onclick="switchTab('signup')">Sign Up</button>
        </div>

        <h2 id="form-title" style="color: #2c3e50; margin-top: 0; margin-bottom: 10px;">Welcome Back! 👋</h2>
        <p id="form-subtitle" style="color: #666; font-size: 0.9rem; margin-bottom: 25px;">Log in to access your saved notes and mocks.</p>
        
        <div id="recaptcha-container" style="margin-bottom: 15px;"></div>

        <div id="phone-section">
            <div class="phone-input-group">
                <input type="text" value="+91" disabled style="width: 60px; text-align: center; background: #f8f9fa; font-weight: bold; color: #555;">
                <input type="number" id="phone-number" placeholder="Enter 10 digit number" style="flex: 1;">
            </div>
            <button onclick="sendOTP()" class="login-btn primary-btn" id="send-otp-btn">Send OTP 📲</button>
        </div>

        <div id="otp-section" style="display: none;">
            <p style="color: #27ae60; font-size: 0.9rem; margin-bottom: 15px; font-weight: bold;">OTP Sent! Check your SMS.</p>
            <input type="number" id="otp-code" placeholder="Enter 6-digit OTP" style="width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; outline: none; font-size: 1rem; margin-bottom: 20px; text-align: center; letter-spacing: 5px; box-sizing: border-box;">
            <button onclick="verifyOTP()" class="login-btn success-btn" id="verify-otp-btn">Verify & Continue ✅</button>
            <p style="margin-top: 15px; font-size: 0.85rem; color: #e74c3c; cursor: pointer; text-decoration: underline;" onclick="window.location.reload()">Wrong Number? Change it</p>
        </div>

        <div class="divider"><span>OR</span></div>

        <button class="login-btn google-btn" onclick="loginWithGoogle()">
            <img src="https://upload.wikimedia.org/wikipedia/commons/c/c1/Google_%22G%22_logo.svg" width="20" alt="Google">
            <span id="google-btn-text">Sign in with Google</span>
        </button>

    </div>

    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    
    <script>
        // API KEY CONFIGURATION
        const firebaseConfig = {
            apiKey: "AIzaSyDl6BATbzjeZaMdnC8eBXbdMcj1ainGVEE", 
            authDomain: "examspark-ca92a.firebaseapp.com",
            projectId: "examspark-ca92a",
            storageBucket: "examspark-ca92a.firebasestorage.app",
            messagingSenderId: "503360136413",
            appId: "1:503360136413:web:4676aa12cb47da06dd6734"
        };
        if (!firebase.apps.length) { firebase.initializeApp(firebaseConfig); }

        let confirmationResult;
        let currentMode = 'login'; // Track if user is on login or signup tab

        // UI SWITCHER FOR TABS
        function switchTab(mode) {
            currentMode = mode;
            document.getElementById('tab-login').classList.remove('active');
            document.getElementById('tab-signup').classList.remove('active');
            
            if(mode === 'login') {
                document.getElementById('tab-login').classList.add('active');
                document.getElementById('form-title').innerText = "Welcome Back! 👋";
                document.getElementById('form-subtitle').innerText = "Log in to access your saved notes and mocks.";
                document.getElementById('google-btn-text').innerText = "Sign in with Google";
            } else {
                document.getElementById('tab-signup').classList.add('active');
                document.getElementById('form-title').innerText = "Join ExamSpark ⚡";
                document.getElementById('form-subtitle').innerText = "Create a free account to track your progress.";
                document.getElementById('google-btn-text').innerText = "Sign up with Google";
            }
        }

        // Setup Invisible reCAPTCHA
        window.onload = function() {
            window.recaptchaVerifier = new firebase.auth.RecaptchaVerifier('recaptcha-container', {
                'size': 'invisible'
            });
        };

        // SEND OTP
        function sendOTP() {
            const phoneInput = document.getElementById("phone-number").value.trim();
            const btn = document.getElementById("send-otp-btn");
            if (phoneInput.length !== 10) { alert("Bhai, sahi 10-digit number daalo!"); return; }

            const fullNumber = "+91" + phoneInput;
            btn.innerText = "Sending..."; btn.disabled = true;

            firebase.auth().signInWithPhoneNumber(fullNumber, window.recaptchaVerifier)
                .then((result) => {
                    confirmationResult = result;
                    document.getElementById("phone-section").style.display = "none";
                    document.getElementById("otp-section").style.display = "block";
                }).catch((error) => {
                    alert("Error sending OTP. Please try again.");
                    window.recaptchaVerifier.render().then(widgetId => grecaptcha.reset(widgetId));
                    btn.innerText = "Send OTP 📲"; btn.disabled = false;
                });
        }

        // VERIFY OTP & CHECK IF NEW USER
        function verifyOTP() {
            const otpCode = document.getElementById("otp-code").value.trim();
            const btn = document.getElementById("verify-otp-btn");
            if (otpCode.length !== 6) { alert("6 digit ka OTP daalo bhai!"); return; }

            btn.innerText = "Verifying..."; btn.disabled = true;

            confirmationResult.confirm(otpCode).then((result) => {
                handleLoginSuccess(result);
            }).catch((error) => {
                alert("Galat OTP! Wapas try karo.");
                btn.innerText = "Verify & Continue ✅"; btn.disabled = false;
            });
        }

        // GOOGLE LOGIN
        function loginWithGoogle() {
            const provider = new firebase.auth.GoogleAuthProvider();
            firebase.auth().signInWithPopup(provider).then((result) => {
                handleLoginSuccess(result);
            }).catch((error) => { 
                alert("Login Error: " + error.message); 
            });
        }

        // SMART REDIRECT & WELCOME MESSAGE LOGIC
        function handleLoginSuccess(result) {
            // Firebase "isNewUser" flag check karta hai ki kya user pehli baar aaya hai
            const isNewUser = result.additionalUserInfo.isNewUser;
            
            if (isNewUser) {
                alert("Account Created Successfully! Welcome to ExamSpark 🚀");
            } else {
                alert("Login Successful! Welcome back ⚡");
            }

            let returnUrl = sessionStorage.getItem('returnPage') || "index.html";
            sessionStorage.removeItem('returnPage');
            window.location.href = returnUrl; 
        }
    </script>
</body>
</html>
